version: "3.9"

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: travelgraph-falkordb
    ports:
      - "6379:6379"   # FalkorDB (Redis protokolü)
      - "3000:3000"   # FalkorDB Browser UI
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_GRAPH=travelgraph
    depends_on:
      falkordb:
        condition: service_healthy
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  falkordb_data:
