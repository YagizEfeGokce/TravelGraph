version: "3.9"

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: travelgraph-falkordb
    ports:
      - "6379:6379"   # FalkorDB (Redis protokolü)
      - "3000:3000"   # FalkorDB Browser UI
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  falkordb_data:
