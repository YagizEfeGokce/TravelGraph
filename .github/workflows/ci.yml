name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Create .env
        run: |
          cd backend
          cp .env.example .env
      - name: Run seed
        run: |
          cd backend
          python -m db.seed
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v
